<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Oficial CEDESP - Bingo 2026</title>
    <link rel="icon" href="assets/image/CORACAO_COMUNITA.png" type="image/png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@300;400;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" />
    
    <style>
        :root {
            --petal-pink: #BC68A1; 
            --sunflower-gold: #F4B841;
            --dim-grey: #626262;
            --bg-color: #fcf9fc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sofia Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--dim-grey); padding: 1.5rem 1rem; display: flex; flex-direction: column; align-items: center; }
        
        .header-publico { text-align: center; margin-bottom: 2rem; width: 100%; max-width: 800px; }
        .header-publico img { max-width: 200px; margin-bottom: 1rem; }
        .header-publico h1 { color: var(--petal-pink); font-size: 2rem; text-transform: uppercase; letter-spacing: 1px; }
        .header-publico p { font-size: 1rem; color: #a0a0a0; margin-top: 5px; }

        .ranking-card { background: white; width: 100%; max-width: 1000px; border-radius: 16px; padding: 15px; box-shadow: 0 4px 20px rgba(188, 104, 161, 0.08); margin-bottom: 2rem; }
        .section-title { text-align: center; margin-bottom: 1.5rem; color: var(--dim-grey); font-size: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        th { color: #a0a0a0; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .text-center { text-align: center; }
        
        .table-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--petal-pink); }
        .highlight-purple { color: var(--petal-pink); font-weight: bold; font-size: 1.1rem; }
        
        .search-bar { width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #ccc; color: var(--dim-grey); font-size: 1rem; outline: none; transition: 0.3s; margin-bottom: 1rem; }
        .search-bar:focus { border-color: var(--petal-pink); box-shadow: 0 0 0 3px rgba(188, 104, 161, 0.2); }

        /* Paginação Discreta */
        .discrete-pagination { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        .btn-page-discrete { background: var(--bg-color); border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 1.2rem; color: var(--petal-pink); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; transition: 0.2s; font-weight: bold; }
        .btn-page-discrete:hover:not(:disabled) { border-color: var(--petal-pink); background: white; }
        .btn-page-discrete:disabled { color: #ccc; border-color: #eee; cursor: not-allowed; }
        .page-input-discrete { width: 45px; height: 32px; padding: 4px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; color: var(--dim-grey); outline: none; }
        
        .status-update { text-align: center; font-size: 0.9rem; color: #a0a0a0; margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Posições (Pódio) */
        .pos-1 { color: #FFD700; font-size: 1.8rem; } /* Ouro */
        .pos-2 { color: #C0C0C0; font-size: 1.6rem; } /* Prata */
        .pos-3 { color: #CD7F32; font-size: 1.4rem; } /* Bronze */
    </style>
</head>
<body>

    <div class="header-publico">
        <img src="assets/image/logo_cedesp.png" alt="Logo CEDESP">
        <h1>Ranking da Campanha</h1>
        <p>Acompanhe os top vendedores em tempo real!</p>
    </div>

    <div class="ranking-card">
        <h2 class="section-title"><span class="material-symbols-outlined" style="font-size: 2rem; color: var(--sunflower-gold);">emoji_events</span> Top Educandos</h2>
        <input type="text" id="buscaRankingPublico" class="search-bar" placeholder="🔍 Pesquisar pelo seu nome...">
        
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th class="text-center" style="width: 50px;">Pos.</th>
                        <th style="width: 50px;">Foto</th>
                        <th style="width: 100%;">Nome do Educando</th>
                        <th>Turma</th>
                        <th class="text-center">Vendidos</th>
                        <th class="text-center">Prêmios Alcançados</th>
                    </tr>
                </thead>
                <tbody id="tabelaAlunosPublica">
                    <tr><td colspan="6" class="text-center">Carregando placar ao vivo...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="paginacaoAlunos"></div>
    </div>

    <div class="status-update">
        <span class="material-symbols-outlined spinner" id="iconeSync" style="font-size: 18px;">sync</span>
        <span id="textoUltimaAtt">Conectando ao servidor...</span>
    </div>

    <script>
        // ==========================================
        // LÓGICA DO RANKING PÚBLICO (ISOLADO)
        // ==========================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwWD-pi7qf1Vlp01I8CO-7euJmqsNureruSEjeFc9bdYUZ_M13he6bqBC_ctJGHUpc4ow/exec'; 
        
        let educandosGlobal = [];
        let termoBusca = "";
        let paginaAtual = 1;
        const itensPorPagina = 10;

        function calcularRecompensas(qtdVendidos) {
            let fone = qtdVendidos >= 10 ? 1 : 0;
            let cartelas = qtdVendidos >= 10 ? 1 + Math.floor((qtdVendidos - 10) / 5) : 0;
            return { fone, cartelas };
        }

        function renderizarAlunos() {
            const tabela = document.getElementById("tabelaAlunosPublica");
            
            // Filtra e Ordena
            let filtrados = [...educandosGlobal].sort((a, b) => b.lotesVendidos - a.lotesVendidos);
            filtrados = filtrados.filter(a => a.lotesVendidos > 0 || a.lotesPendentes > 0);
            
            // Aplica Busca
            if (termoBusca) {
                filtrados = filtrados.filter(a => a.nome.toLowerCase().includes(termoBusca.toLowerCase()));
            }

            // Paginação
            const totalPaginas = Math.ceil(filtrados.length / itensPorPagina) || 1;
            if(paginaAtual > totalPaginas) paginaAtual = totalPaginas;
            if(paginaAtual < 1) paginaAtual = 1;

            const startIdx = (paginaAtual - 1) * itensPorPagina;
            const paginated = filtrados.slice(startIdx, startIdx + itensPorPagina);

            // Monta a Tabela
            tabela.innerHTML = paginated.map((aluno, index) => {
                const posReal = startIdx + index + 1;
                const rec = calcularRecompensas(aluno.lotesVendidos);
                
                // Formatação dos Prêmios (Oculta Fone e Cartelas se estiverem zerados)
                let premiosHTML = [];
                if(rec.cartelas > 0) premiosHTML.push(`<span style="color:var(--sunflower-gold); font-weight:bold;">${rec.cartelas}x Cartela(s)</span>`);
                if(rec.fone > 0) premiosHTML.push(`<span style="color:var(--petal-pink); font-weight:bold;">Fone BT</span>`);
                let premiosTexto = premiosHTML.length > 0 ? premiosHTML.join(' + ') : '<span style="color:#ccc;">-</span>';

                // Ícones do Pódio
                let iconePos = `<span style="font-weight:bold; font-size:1.1rem;">${posReal}º</span>`;
                if(posReal === 1) iconePos = `<span class="material-symbols-outlined pos-1">workspace_premium</span>`;
                else if(posReal === 2) iconePos = `<span class="material-symbols-outlined pos-2">workspace_premium</span>`;
                else if(posReal === 3) iconePos = `<span class="material-symbols-outlined pos-3">workspace_premium</span>`;

                return `<tr>
                    <td class="text-center">${iconePos}</td>
                    <td><img src="${aluno.foto}" class="table-avatar"></td>
                    <td style="white-space: nowrap;"><strong style="color:#333; font-size:1.05rem;">${aluno.nome}</strong><br><small style="color:#a0a0a0">Resp: ${aluno.educadorResponsavel}</small></td>
                    <td style="color:var(--dim-grey); white-space: nowrap;">${aluno.turma}</td>
                    <td class="text-center highlight-purple" style="font-size:1.2rem;">${aluno.lotesVendidos}</td>
                    <td class="text-center" style="white-space: nowrap;">${premiosTexto}</td>
                </tr>`;
            }).join('') || '<tr><td colspan="6" class="text-center" style="padding: 20px; color: #a0a0a0;">Nenhum aluno encontrado.</td></tr>';

            // Monta Controles de Paginação Discreta
            const divPag = document.getElementById("paginacaoAlunos");
            divPag.innerHTML = `
                <div class="discrete-pagination">
                    <button class="btn-page-discrete" ${paginaAtual === 1 ? 'disabled' : ''} onclick="mudarPagina(-1)">&lt;</button>
                    <input type="number" class="page-input-discrete" value="${paginaAtual}" min="1" max="${totalPaginas}" onchange="pularPagina(this)">
                    <span style="color:var(--dim-grey); font-size:0.9rem;">de ${totalPaginas}</span>
                    <button class="btn-page-discrete" ${paginaAtual === totalPaginas ? 'disabled' : ''} onclick="mudarPagina(1)">&gt;</button>
                </div>
            `;
        }

        window.mudarPagina = function(dir) { paginaAtual += dir; renderizarAlunos(); }
        window.pularPagina = function(input) { paginaAtual = parseInt(input.value) || 1; renderizarAlunos(); }

        document.getElementById("buscaRankingPublico").addEventListener('input', (e) => {
            termoBusca = e.target.value;
            paginaAtual = 1;
            renderizarAlunos();
        });

        // Loop de Atualização ao vivo
        function sincronizarDadosAoVivo() {
            const icone = document.getElementById("iconeSync");
            const texto = document.getElementById("textoUltimaAtt");
            
            icone.classList.add("spinner");
            texto.innerText = "Atualizando placar...";

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'sincronizar_dados' }) })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    educandosGlobal = data.educandos.map(e => ({
                        nome: e['Nome_Educando'] || e['Nome'], 
                        turma: e['Turma'], 
                        educadorResponsavel: e['Educador_Responsavel'] || '',
                        foto: e['Foto_URL'] && String(e['Foto_URL']).trim() !== '' ? e['Foto_URL'] : `https://ui-avatars.com/api/?name=${e['Nome_Educando'] || e['Nome']}&background=BC68A1&color=fff`,
                        lotesVendidos: e['Lotes_Vendidos'] ? String(e['Lotes_Vendidos']).split(',').filter(Boolean).length : 0,
                        lotesPendentes: e['Lotes_Pendentes'] ? String(e['Lotes_Pendentes']).split(',').filter(Boolean).length : 0
                    }));

                    renderizarAlunos();

                    const dataHora = new Date();
                    const horaFormatada = dataHora.getHours().toString().padStart(2, '0') + ':' + dataHora.getMinutes().toString().padStart(2, '0');
                    texto.innerText = `Última atualização: Hoje às ${horaFormatada}`;
                    icone.classList.remove("spinner");
                }
            }).catch(err => {
                console.error(err);
                texto.innerText = "Falha ao atualizar. Tentando novamente em breve...";
                icone.classList.remove("spinner");
            });
        }

        // Dá a partida!
        sincronizarDadosAoVivo();

        // 60000ms = Atualiza sozinho a cada 1 minuto
        setInterval(sincronizarDadosAoVivo, 60000);

    </script>
</body>
</html>
