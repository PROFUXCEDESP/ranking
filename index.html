<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranking Oficial CEDESP - Bingo 2026</title>
    <link rel="icon" href="assets/image/logo_cedesp.png" type="image/png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@300;400;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" />
    
    <style>
        :root { --petal-pink: #BC68A1; --sunflower-gold: #F4B841; --dim-grey: #4a4a4a; --light-grey: #888888; --bg-color: #f4f4f9; --card-bg: #ffffff; --border-color: #eaebf0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sofia Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--dim-grey); padding: 1.5rem 0.5rem; display: flex; flex-direction: column; align-items: center; }
        
        .header-publico { text-align: center; margin-bottom: 1.5rem; width: 100%; max-width: 1000px; padding: 0 10px; }
        .header-publico img { width: 100%; max-width: 180px; margin-bottom: 0.5rem; transition: 0.3s; }
        .header-publico h1 { color: var(--petal-pink); font-size: clamp(1.5rem, 4vw, 2.2rem); text-transform: uppercase; letter-spacing: 1px; line-height: 1.2; }
        
        /* Sistema de Abas (Tabs) */
        .tabs-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; width: 100%; max-width: 1000px; }
        .tab-btn { flex: 1; max-width: 300px; padding: 12px; border: 2px solid var(--border-color); border-radius: 10px; background: var(--card-bg); color: var(--light-grey); font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--petal-pink); color: white; border-color: var(--petal-pink); box-shadow: 0 4px 15px rgba(188, 104, 161, 0.3); }
        .tab-content { display: none; width: 100%; max-width: 1100px; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ranking-card { background: var(--card-bg); width: 100%; border-radius: 16px; padding: 15px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05); }
        .search-bar { width: 100%; padding: 0.8rem 1rem; border-radius: 10px; border: 1px solid var(--border-color); color: var(--dim-grey); font-size: 1rem; outline: none; margin-bottom: 1.5rem; background-color: #fafafa; }
        .search-bar:focus { border-color: var(--petal-pink); background-color: #fff; }

        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; }
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 4px; }
        
        table { width: 100%; border-collapse: collapse; min-width: 750px; text-align: left; }
        th, td { padding: 14px 10px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        th { color: var(--light-grey); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; background-color: #fdfdfd; }
        .text-center { text-align: center; }
        
        .table-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid var(--petal-pink); display: block; margin: 0 auto; }
        .highlight-purple { color: var(--petal-pink); font-weight: 700; font-size: 1.15rem; }
        .nome-aluno { color: #222; font-weight: 600; font-size: 1.05rem; }
        
        .discrete-pagination { display: flex; justify-content: center; gap: 12px; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .btn-page-discrete { background: #fff; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 1.2rem; color: var(--petal-pink); width: 36px; height: 36px; font-weight: bold; }
        .btn-page-discrete:hover:not(:disabled) { background: var(--petal-pink); color: white; border-color: var(--petal-pink); }
        .btn-page-discrete:disabled { color: #ccc; cursor: not-allowed; }
        .page-input-discrete { width: 45px; height: 36px; text-align: center; border: 1px solid #ccc; border-radius: 6px; font-weight: 600; color: var(--dim-grey); outline: none; }
        
        .status-update { text-align: center; font-size: 0.85rem; color: var(--light-grey); margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 500; }
        .spinner { animation: spin 1s linear infinite; color: var(--petal-pink); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header-publico">
        <img src="assets/image/logo_cedesp.png" alt="Logo CEDESP">
        <h1>Ranking da Campanha</h1>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="mudarAba('educandos')">Educandos</button>
        <button class="tab-btn" onclick="mudarAba('educadores')">Educadores</button>
    </div>

    <div id="tab-educadores" class="tab-content">
        <div class="ranking-card">
            <h2 class="section-title"><span class="material-symbols-outlined" style="font-size: 2rem; color: var(--sunflower-gold);">school</span> Ranking de Educadores</h2>
            <div class="table-container">
                <table style="min-width: 500px;">
                    <thead><tr><th class="text-center">Pos.</th><th>Educador</th><th>Curso</th><th class="text-center">Lotes Consolidados</th></tr></thead>
                    <tbody id="tabelaEducadoresPublica"><tr><td colspan="4" class="text-center">Carregando...</td></tr></tbody>
                </table>
            </div>
            <div id="paginacaoEducadores"></div>
        </div>
    </div>

    <div id="tab-educandos" class="tab-content active">
        <div class="ranking-card">
            <input type="text" id="buscaRankingPublico" class="search-bar" placeholder="🔍 Digite seu nome para buscar...">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="text-center" style="width: 50px;">Pos.</th>
                            <th class="text-center" style="width: 60px;">Foto</th>
                            <th style="width: 25%;">Nome</th>
                            <th style="width: 15%;">Turma</th>
                            <th style="width: 20%;">Curso</th>
                            <th class="text-center" style="width: 80px;">Vendidos</th>
                            <th class="text-center" style="width: 100px;">Cartelas Extra</th>
                            <th class="text-center" style="width: 60px;">Fone</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaAlunosPublica">
                        <tr><td colspan="8" class="text-center" style="padding: 2rem;">Sincronizando placar...</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="paginacaoAlunos"></div>
        </div>
    </div>

    <div class="status-update">
        <span class="material-symbols-outlined spinner" id="iconeSync" style="font-size: 18px;">sync</span>
        <span id="textoUltimaAtt">Conectando...</span>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwWD-pi7qf1Vlp01I8CO-7euJmqsNureruSEjeFc9bdYUZ_M13he6bqBC_ctJGHUpc4ow/exec'; 
        
        let educandosGlobal = []; let educadoresGlobal = [];
        let termoBusca = ""; let paginaAtualAlunos = 1; let paginaAtualEducadores = 1; const itensPorPagina = 10;
        
        // Filtro invisível para remover o corpo administrativo do ranking de educadores
        const nomesExcluidos = ['jhersyka', 'debora', 'bruna'];

        // Função de inteligência de texto para ignorar acentos, maiúsculas e espaços
        function textoIgual(t1, t2) {
            if(!t1 || !t2) return false;
            return t1.normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().toLowerCase() === 
                   t2.normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().toLowerCase();
        }

        function mudarAba(aba) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + aba).classList.add('active');
        }

        function calcularRecompensas(qtdVendidos) {
            let fone = qtdVendidos >= 10 ? 1 : 0;
            let cartelas = qtdVendidos >= 5 ? 1 + Math.floor((qtdVendidos - 5) / 5) : 0;
            return { fone, cartelas };
        }

        // ================== RENDERIZAR EDUCANDOS ==================
        function renderizarAlunos() {
            const tabela = document.getElementById("tabelaAlunosPublica");
            let filtrados = [...educandosGlobal].sort((a, b) => b.lotesVendidos - a.lotesVendidos);
            filtrados = filtrados.filter(a => a.lotesVendidos > 0 || a.lotesPendentes > 0);
            if (termoBusca) filtrados = filtrados.filter(a => a.nome.toLowerCase().includes(termoBusca.toLowerCase()));

            const total = Math.ceil(filtrados.length / itensPorPagina) || 1;
            if(paginaAtualAlunos > total) paginaAtualAlunos = total;
            const startIdx = (paginaAtualAlunos - 1) * itensPorPagina;
            const paginated = filtrados.slice(startIdx, startIdx + itensPorPagina);

            tabela.innerHTML = paginated.map((aluno, index) => {
                const rec = calcularRecompensas(aluno.lotesVendidos);
                const cartelasHTML = rec.cartelas > 0 ? `<span style="color:var(--sunflower-gold); font-weight:bold; font-size:1.1rem;">${rec.cartelas}</span>` : '<span style="color:#ddd;">-</span>';
                const foneHTML = rec.fone > 0 ? '<span class="material-symbols-outlined" style="color:var(--petal-pink);">headphones</span>' : '<span style="color:#ddd;">-</span>';
                return `<tr>
                    <td class="text-center"><span style="font-weight:700; font-size:1.1rem; color:var(--dim-grey);">${startIdx + index + 1}º</span></td>
                    <td><img src="${aluno.foto}" class="table-avatar" loading="lazy"></td>
                    <td><span class="nome-aluno">${aluno.nome}</span></td>
                    <td style="color:var(--light-grey);">${aluno.turma}</td>
                    <td style="color:var(--light-grey);">${aluno.curso}</td>
                    <td class="text-center highlight-purple">${aluno.lotesVendidos}</td>
                    <td class="text-center">${cartelasHTML}</td>
                    <td class="text-center">${foneHTML}</td>
                </tr>`;
            }).join('') || '<tr><td colspan="8" class="text-center" style="padding: 2.5rem; color: #a0a0a0;">Nenhum registro encontrado.</td></tr>';

            document.getElementById("paginacaoAlunos").innerHTML = `
                <div class="discrete-pagination">
                    <button class="btn-page-discrete" ${paginaAtualAlunos === 1 ? 'disabled' : ''} onclick="mudarPagina('aluno', -1)">&lt;</button>
                    <input type="number" class="page-input-discrete" value="${paginaAtualAlunos}" onchange="pularPagina('aluno', this)">
                    <span style="color:var(--light-grey); font-size:0.95rem; font-weight:600;">de ${total}</span>
                    <button class="btn-page-discrete" ${paginaAtualAlunos === total ? 'disabled' : ''} onclick="mudarPagina('aluno', 1)">&gt;</button>
                </div>`;
        }

        // ================== RENDERIZAR EDUCADORES ==================
        function renderizarEducadores() {
            const tabela = document.getElementById("tabelaEducadoresPublica");
            let filtrados = [...educadoresGlobal].sort((a, b) => b.lotesVendidos - a.lotesVendidos);
            
            const total = Math.ceil(filtrados.length / itensPorPagina) || 1;
            if(paginaAtualEducadores > total) paginaAtualEducadores = total;
            const startIdx = (paginaAtualEducadores - 1) * itensPorPagina;
            const paginated = filtrados.slice(startIdx, startIdx + itensPorPagina);

            tabela.innerHTML = paginated.map((prof, index) => {
                return `<tr>
                    <td class="text-center"><span style="font-weight:700; font-size:1.1rem; color:var(--petal-pink);">${startIdx + index + 1}º</span></td>
                    <td><span class="nome-aluno">${prof.nome}</span></td>
                    <td style="color:var(--light-grey);">${prof.curso}</td>
                    <td class="text-center highlight-purple">${prof.lotesVendidos}</td>
                </tr>`;
            }).join('') || '<tr><td colspan="4" class="text-center" style="padding: 2.5rem; color: #a0a0a0;">Nenhum registro encontrado.</td></tr>';

            document.getElementById("paginacaoEducadores").innerHTML = `
                <div class="discrete-pagination">
                    <button class="btn-page-discrete" ${paginaAtualEducadores === 1 ? 'disabled' : ''} onclick="mudarPagina('edu', -1)">&lt;</button>
                    <input type="number" class="page-input-discrete" value="${paginaAtualEducadores}" onchange="pularPagina('edu', this)">
                    <span style="color:var(--light-grey); font-size:0.95rem; font-weight:600;">de ${total}</span>
                    <button class="btn-page-discrete" ${paginaAtualEducadores === total ? 'disabled' : ''} onclick="mudarPagina('edu', 1)">&gt;</button>
                </div>`;
        }

        window.mudarPagina = function(tipo, dir) { if(tipo==='aluno') { paginaAtualAlunos += dir; renderizarAlunos(); } else { paginaAtualEducadores += dir; renderizarEducadores(); } }
        window.pularPagina = function(tipo, input) { if(tipo==='aluno') { paginaAtualAlunos = parseInt(input.value) || 1; renderizarAlunos(); } else { paginaAtualEducadores = parseInt(input.value) || 1; renderizarEducadores(); } }

        document.getElementById("buscaRankingPublico").addEventListener('input', (e) => { termoBusca = e.target.value; paginaAtualAlunos = 1; renderizarAlunos(); });

        function sincronizarDadosAoVivo() {
            const icone = document.getElementById("iconeSync"); const texto = document.getElementById("textoUltimaAtt");
            icone.classList.add("spinner"); texto.innerText = "Atualizando dados...";

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'sincronizar_dados' }) })
            .then(res => res.json()).then(data => {
                if(data.success) {
                    // Mapeia educandos e remove do ranking a categoria de Equipe Direta de Vendas
                    educandosGlobal = data.educandos.map(e => ({
                        nome: e['Nome_Educando'] || e['Nome'], turma: e['Turma'], curso: e['Curso'] || '-',
                        foto: e['Foto_URL'] && String(e['Foto_URL']).trim() !== '' ? e['Foto_URL'] : `https://ui-avatars.com/api/?name=${e['Nome_Educando'] || e['Nome']}&background=BC68A1&color=fff`,
                        lotesVendidos: e['Lotes_Vendidos'] ? String(e['Lotes_Vendidos']).split(',').filter(Boolean).length : 0,
                        lotesPendentes: e['Lotes_Pendentes'] ? String(e['Lotes_Pendentes']).split(',').filter(Boolean).length : 0
                    })).filter(a => a.turma !== 'Equipe');

                    // Mapeia os educadores cruzando dados com a função inteligente textoIgual
                    educadoresGlobal = data.educadores.map(e => {
                        let vendidos = 0;
                        data.educandos.forEach(al => { 
                            if(textoIgual(al['Educador_Responsavel'] || al['Educador_Responsavel'], e['Nome'])) {
                                vendidos += (al['Lotes_Vendidos'] ? String(al['Lotes_Vendidos']).split(',').filter(Boolean).length : 0);
                            }
                        });
                        return { nome: e['Nome'], curso: e['Curso Responsavel'], lotesVendidos: vendidos };
                    }).filter(e => {
                        let nomeLimpo = e.nome.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
                        return !nomesExcluidos.includes(nomeLimpo);
                    });

                    renderizarAlunos(); renderizarEducadores();
                    const d = new Date(); texto.innerText = `Placar atualizado às ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                    icone.classList.remove("spinner");
                }
            }).catch(err => { texto.innerText = "Erro na rede. Reconectando..."; icone.classList.remove("spinner"); });
        }

        sincronizarDadosAoVivo(); setInterval(sincronizarDadosAoVivo, 60000);
    </script>
</body>
</html>
