<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranking Oficial CEDESP - Bingo 2026</title>
    <link rel="icon" href="assets/image/CORACAO_COMUNITA.png" type="image/png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@300;400;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" />
    
    <style>
        :root {
            --petal-pink: #BC68A1; 
            --sunflower-gold: #F4B841;
            --dim-grey: #4a4a4a;
            --light-grey: #888888;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --border-color: #eaebf0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sofia Sans', sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--dim-grey); 
            padding: 2rem 1rem; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Cabeçalho Responsivo */
        .header-publico { text-align: center; margin-bottom: 2rem; width: 100%; max-width: 1000px; }
        .header-publico img { width: 100%; max-width: 200px; margin-bottom: 0.5rem; transition: 0.3s; }
        .header-publico h1 { color: var(--petal-pink); font-size: clamp(1.5rem, 4vw, 2.2rem); text-transform: uppercase; letter-spacing: 1px; line-height: 1.2; }
        .header-publico p { font-size: clamp(0.9rem, 2vw, 1.1rem); color: var(--light-grey); margin-top: 5px; }

        /* Card Principal */
        .ranking-card { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 1100px; 
            border-radius: 16px; 
            padding: 20px; 
            box-shadow: 0 8px 30px rgba(188, 104, 161, 0.06); 
            margin-bottom: 1.5rem; 
        }

        .section-title { 
            text-align: center; 
            margin-bottom: 1.5rem; 
            color: var(--dim-grey); 
            font-size: clamp(1.2rem, 3vw, 1.6rem); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
        }
        
        .search-bar { 
            width: 100%; 
            padding: 0.8rem 1rem; 
            border-radius: 10px; 
            border: 1px solid var(--border-color); 
            color: var(--dim-grey); 
            font-size: 1rem; 
            outline: none; 
            transition: all 0.3s ease; 
            margin-bottom: 1.5rem; 
            background-color: #fafafa;
        }
        .search-bar:focus { border-color: var(--petal-pink); box-shadow: 0 0 0 3px rgba(188, 104, 161, 0.15); background-color: #fff; }

        /* Container da Tabela (O Segredo do Scroll Mobile) */
        .table-container { 
            width: 100%; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
            border-radius: 8px;
        }
        
        /* Customizando a barra de rolagem horizontal para ficar elegante */
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: var(--petal-pink); }

        table { width: 100%; border-collapse: collapse; min-width: 800px; text-align: left; }
        th, td { padding: 14px 10px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        th { color: var(--light-grey); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; background-color: #fdfdfd; position: sticky; top: 0; }
        
        .text-center { text-align: center; }
        
        /* Imagem e Textos fluidos */
        .table-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid var(--petal-pink); display: block; margin: 0 auto; }
        .highlight-purple { color: var(--petal-pink); font-weight: 700; font-size: 1.15rem; }
        .nome-aluno { color: #222; font-weight: 600; font-size: 1.05rem; }
        .info-secundaria { color: var(--light-grey); font-size: 0.85rem; }

        /* Paginação */
        .discrete-pagination { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .btn-page-discrete { background: #fff; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 1.2rem; color: var(--petal-pink); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; transition: 0.2s; font-weight: bold; }
        .btn-page-discrete:hover:not(:disabled) { border-color: var(--petal-pink); background: var(--petal-pink); color: white; }
        .btn-page-discrete:disabled { color: #ccc; border-color: #eee; cursor: not-allowed; }
        .page-input-discrete { width: 45px; height: 36px; padding: 4px; text-align: center; border: 1px solid #ccc; border-radius: 6px; font-weight: 600; color: var(--dim-grey); outline: none; }
        
        /* Status Update Animado */
        .status-update { text-align: center; font-size: 0.85rem; color: var(--light-grey); margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 500; }
        .spinner { animation: spin 1s linear infinite; color: var(--petal-pink); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* =========================================
           RESPONSIVIDADE (MOBILE MAX 768px)
           ========================================= */
        @media (max-width: 768px) {
            body { padding: 1rem 0.5rem; }
            .ranking-card { padding: 15px 10px; border-radius: 12px; }
            .header-publico img { max-width: 160px; }
            
            /* Ajusta a tabela para telas menores */
            th, td { padding: 12px 8px; font-size: 0.9rem; }
            .table-avatar { width: 36px; height: 36px; }
            .nome-aluno { font-size: 0.95rem; }
            .highlight-purple { font-size: 1.05rem; }
            
            /* Diminui o min-width para forçar o scroll horizontal perfeito sem "espremer" muito */
            table { min-width: 700px; }
        }
    </style>
</head>
<body>

    <div class="header-publico">
        <img src="assets/image/logo_cedesp.png" alt="Logo CEDESP">
        <h1>Ranking da Campanha</h1>
        <p>Acompanhe os resultados ao vivo!</p>
    </div>

    <div class="ranking-card">
        <h2 class="section-title"><span class="material-symbols-outlined" style="font-size: 2rem; color: var(--sunflower-gold);">emoji_events</span> Classificação Oficial</h2>
        <input type="text" id="buscaRankingPublico" class="search-bar" placeholder="🔍 Digite seu nome para buscar...">
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="text-center" style="width: 50px;">Pos.</th>
                        <th class="text-center" style="width: 60px;">Foto</th>
                        <th style="width: 25%;">Nome</th>
                        <th style="width: 15%;">Turma</th>
                        <th style="width: 20%;">Curso</th>
                        <th class="text-center" style="width: 80px;">Vendidos</th>
                        <th class="text-center" style="width: 100px;">Cartelas Extra</th>
                        <th class="text-center" style="width: 60px;">Fone</th>
                    </tr>
                </thead>
                <tbody id="tabelaAlunosPublica">
                    <tr><td colspan="8" class="text-center" style="padding: 2rem;">Sincronizando dados com a secretaria...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="paginacaoAlunos"></div>
    </div>

    <div class="status-update">
        <span class="material-symbols-outlined spinner" id="iconeSync" style="font-size: 18px;">sync</span>
        <span id="textoUltimaAtt">Conectando...</span>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwWD-pi7qf1Vlp01I8CO-7euJmqsNureruSEjeFc9bdYUZ_M13he6bqBC_ctJGHUpc4ow/exec'; 
        
        let educandosGlobal = [];
        let termoBusca = "";
        let paginaAtual = 1;
        const itensPorPagina = 10;

        function calcularRecompensas(qtdVendidos) {
            let fone = qtdVendidos >= 10 ? 1 : 0;
            let cartelas = qtdVendidos >= 5 ? 1 + Math.floor((qtdVendidos - 5) / 5) : 0;
            return { fone, cartelas };
        }

        function renderizarAlunos() {
            const tabela = document.getElementById("tabelaAlunosPublica");
            
            let filtrados = [...educandosGlobal].sort((a, b) => b.lotesVendidos - a.lotesVendidos);
            filtrados = filtrados.filter(a => a.lotesVendidos > 0 || a.lotesPendentes > 0);
            
            if (termoBusca) {
                filtrados = filtrados.filter(a => a.nome.toLowerCase().includes(termoBusca.toLowerCase()));
            }

            const totalPaginas = Math.ceil(filtrados.length / itensPorPagina) || 1;
            if(paginaAtual > totalPaginas) paginaAtual = totalPaginas;
            if(paginaAtual < 1) paginaAtual = 1;

            const startIdx = (paginaAtual - 1) * itensPorPagina;
            const paginated = filtrados.slice(startIdx, startIdx + itensPorPagina);

            tabela.innerHTML = paginated.map((aluno, index) => {
                const posReal = startIdx + index + 1;
                const rec = calcularRecompensas(aluno.lotesVendidos);
                
                const cartelasHTML = rec.cartelas > 0 ? `<span style="color:var(--sunflower-gold); font-weight:bold; font-size:1.1rem;">${rec.cartelas}</span>` : '<span style="color:#ddd;">-</span>';
                const foneHTML = rec.fone > 0 ? '<span class="material-symbols-outlined" style="color:var(--petal-pink); font-size:22px;">headphones</span>' : '<span style="color:#ddd;">-</span>';

                // Numeração padrão para TODOS, sem distinção visual de medalhas
                const iconePos = `<span style="font-weight:700; font-size:1.1rem; color:var(--dim-grey);">${posReal}º</span>`;

                return `<tr>
                    <td class="text-center">${iconePos}</td>
                    <td><img src="${aluno.foto}" class="table-avatar" loading="lazy"></td>
                    <td><span class="nome-aluno">${aluno.nome}</span></td>
                    <td class="info-secundaria">${aluno.turma}</td>
                    <td class="info-secundaria">${aluno.curso}</td>
                    <td class="text-center highlight-purple">${aluno.lotesVendidos}</td>
                    <td class="text-center">${cartelasHTML}</td>
                    <td class="text-center">${foneHTML}</td>
                </tr>`;
            }).join('') || '<tr><td colspan="8" class="text-center" style="padding: 2.5rem; color: #a0a0a0;">Nenhum registro encontrado.</td></tr>';

            const divPag = document.getElementById("paginacaoAlunos");
            divPag.innerHTML = `
                <div class="discrete-pagination">
                    <button class="btn-page-discrete" ${paginaAtual === 1 ? 'disabled' : ''} onclick="mudarPagina(-1)">&lt;</button>
                    <input type="number" class="page-input-discrete" value="${paginaAtual}" min="1" max="${totalPaginas}" onchange="pularPagina(this)">
                    <span style="color:var(--light-grey); font-size:0.95rem; font-weight:600;">de ${totalPaginas}</span>
                    <button class="btn-page-discrete" ${paginaAtual === totalPaginas ? 'disabled' : ''} onclick="mudarPagina(1)">&gt;</button>
                </div>
            `;
        }

        window.mudarPagina = function(dir) { paginaAtual += dir; renderizarAlunos(); }
        window.pularPagina = function(input) { paginaAtual = parseInt(input.value) || 1; renderizarAlunos(); }

        document.getElementById("buscaRankingPublico").addEventListener('input', (e) => {
            termoBusca = e.target.value;
            paginaAtual = 1;
            renderizarAlunos();
        });

        function sincronizarDadosAoVivo() {
            const icone = document.getElementById("iconeSync");
            const texto = document.getElementById("textoUltimaAtt");
            
            icone.classList.add("spinner");
            texto.innerText = "Atualizando dados...";

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'sincronizar_dados' }) })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    educandosGlobal = data.educandos.map(e => ({
                        nome: e['Nome_Educando'] || e['Nome'], 
                        turma: e['Turma'], 
                        curso: e['Curso'] || '-',
                        educadorResponsavel: e['Educador_Responsavel'] || '',
                        foto: e['Foto_URL'] && String(e['Foto_URL']).trim() !== '' ? e['Foto_URL'] : `https://ui-avatars.com/api/?name=${e['Nome_Educando'] || e['Nome']}&background=BC68A1&color=fff`,
                        lotesVendidos: e['Lotes_Vendidos'] ? String(e['Lotes_Vendidos']).split(',').filter(Boolean).length : 0,
                        lotesPendentes: e['Lotes_Pendentes'] ? String(e['Lotes_Pendentes']).split(',').filter(Boolean).length : 0
                    }));

                    renderizarAlunos();

                    const dataHora = new Date();
                    const horaFormatada = dataHora.getHours().toString().padStart(2, '0') + ':' + dataHora.getMinutes().toString().padStart(2, '0');
                    texto.innerText = `Placar atualizado às ${horaFormatada}`;
                    icone.classList.remove("spinner");
                }
            }).catch(err => {
                console.error(err);
                texto.innerText = "Reconectando ao servidor...";
                icone.classList.remove("spinner");
            });
        }

        sincronizarDadosAoVivo();
        setInterval(sincronizarDadosAoVivo, 60000); // Atualiza a cada 60s
    </script>
</body>
</html>
